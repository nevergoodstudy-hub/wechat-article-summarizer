# Project documentation configuration
site_name: "WeChat Article Summarizer"
site_description: "微信公众号文章总结器 - AI-powered article summarization tool"
site_author: "WeChatSummarizer Team"
site_url: "https://github.com/wechat-summarizer/wechat-article-summarizer"

# Repository
repo_name: "wechat-summarizer/wechat-article-summarizer"
repo_url: "https://github.com/wechat-summarizer/wechat-article-summarizer"

# Navigation
nav:
  - Home: README.md
  - Getting Started: GETTING_STARTED.md
  - Architecture: ARCHITECTURE.md
  - Project Structure: PROJECT_STRUCTURE.md
  - GUI Refactoring: GUI_REFACTORING.md
  - GUI Animation Optimization: GUI_Animation_Optimization.md
  - Windows Build: WINDOWS_BUILD.md
  - Development:
      - Contributing: CONTRIBUTING.md
      - Iteration Roadmap: ITERATION_ROADMAP.md
      - Migration Index: MIGRATION_INDEX.md
  - Audits:
      - Security Audit: audits/SECURITY_AUDIT.md
      - Deep Audit Issues: audits/DEEP_AUDIT_ISSUES.md
      - Deep Audit Improvements: audits/DEEP_AUDIT_IMPROVEMENTS.md
      - Test Report: audits/TEST_REPORT.md
  - Plans:
      - Improvement Plan: plans/IMPROVEMENT_PLAN.md
      - Core Scope View: plans/CORE_SCOPE_VIEW.md
      - Repo Hygiene Cycle: plans/REPO_HYGIENE_CYCLE.md

# Theme
theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - search.suggest
    - search.highlight

# Extensions
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.magiclink
  - pymdownx.tasklist
  - pymdownx.superfences
  - pymdownx.snippets
  - toc:
      permalink: true
  - attr_list
  - md_in_html

# Plugins
plugins:
  - search:
      lang: [en, zh]
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_category_heading: true

# Footer
copyright: "Copyright © 2024-2026 WeChatSummarizer Team"

# Extra
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/wechat-summarizer
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/wechat-summarizer
