name: Multi-Platform Build

on:
  workflow_dispatch:
  push:
    tags: ['v*']
  release:
    types: [published]

env:
  PYTHON_VERSION: '3.12'

jobs:
  # ── Windows ─────────────────────────────────────────────
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[gui,windows,ai,build]

      - name: Build with PyInstaller
        run: |
          pyinstaller "微信文章总结器.spec" --noconfirm

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wechat-summarizer-windows
          path: dist/微信文章总结器.exe
          if-no-files-found: error

  # ── macOS ───────────────────────────────────────────────
  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[gui,ai,build]

      - name: Build with PyInstaller
        run: |
          python scripts/build_macos.py

      - name: Codesign (ad-hoc for CI)
        run: |
          APP_PATH="dist/WeChat Article Summarizer.app"
          if [ -d "$APP_PATH" ]; then
            codesign --force --deep --sign - "$APP_PATH"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wechat-summarizer-macos
          path: |
            dist/*.app
            dist/*.dmg
          if-no-files-found: error

  # ── Linux ───────────────────────────────────────────────
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[gui,ai,build]

      - name: Build with PyInstaller
        run: |
          python scripts/build_linux.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wechat-summarizer-linux
          path: dist/wechat-article-summarizer
          if-no-files-found: error

  # ── Release assets ──────────────────────────────────────
  upload-release:
    name: Upload Release Assets
    needs: [build-windows, build-macos, build-linux]
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/wechat-summarizer-windows/*
            artifacts/wechat-summarizer-macos/*
            artifacts/wechat-summarizer-linux/*
